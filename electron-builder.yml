appId: com.vintywrite.app
productName: VintyWrite
copyright: Copyright © 2026

directories:
  buildResources: resources
  output: dist

files:
  - out/**/*
  - node_modules/**/*
  - package.json

# Windows installer
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: resources/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

# macOS
mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: resources/icon.icns
  category: public.app-category.productivity
  hardenedRuntime: false

dmg:
  background: null
  window:
    width: 540
    height: 380

# Linux
linux:
  target:
    - target: AppImage
      arch:
        - x64
  icon: resources/icon.png
  category: Office
